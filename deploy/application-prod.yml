# ============================================================
# 生产环境配置（Ubuntu VM 部署用）
# 用法：java -jar education-system.jar --spring.profiles.active=prod
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/education_system
    username: root
    password: ${DB_PASSWORD:root123}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:education_system_prod_secret_2026_change_me}
  expiration: 86400000

# 如需覆盖的其他配置在此添加
