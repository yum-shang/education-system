# 应用配置
spring.application.name=education-system

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/education_system
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.education.system.*.model
mybatis.configuration.map-underscore-to-camel-case=true

# 服务配置
server.port=8080
server.servlet.context-path=/api

# 安全配置
spring.security.user.name=admin
spring.security.user.password=admin

# JWT配置
jwt.secret=education_system_secret_key_for_jwt_token_generation_2024_secure
jwt.expiration=86400000


# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 文件存储配置
file.upload.path=./uploads/images

# 报表存储路径
report.storage.path=./uploads/reports

# 日志配置
logging.level.com.example.education.system=info